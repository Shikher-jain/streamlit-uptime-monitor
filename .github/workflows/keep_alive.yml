name: Streamlit Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ping all apps with retry + status check
        run: |
          echo "Starting uptime check..."

          for url in $(jq -r '.apps[]' config/apps.json); do
            echo "-----------------------------"
            echo "Checking: $url"

            success=false

            for i in {1..3}; do
              status=$(curl -o /dev/null -s -w "%{http_code}" $url)

              if [ "$status" = "200" ]; then
                echo "SUCCESS ($status): $url"
                success=true
                break
              else
                echo "Attempt $i failed ($status). Retrying..."
                sleep 5
              fi
            done

            if [ "$success" = false ]; then
              echo "FINAL FAILURE: $url"
              exit 1
            fi
          done

          echo "🎉 All apps are healthy!"
