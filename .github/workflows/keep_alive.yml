name: Keep Streamlit Apps Awake

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq (for JSON parsing)
        run: sudo apt-get install -y jq

      - name: Ping all apps
        run: |
          for url in $(jq -r '.apps[]' config/apps.json); do
            echo "Pinging $url"
            
            for i in {1..3}; do
              status=$(curl -o /dev/null -s -w "%{http_code}" $url)
              if [ "$status" = "200" ]; then
                echo "Success: $url"
                break
              fi
              echo "Retrying $url..."
              sleep 5
            done
          done
